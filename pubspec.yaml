name: personal_training_app
description: Final Year Project


publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.5 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  firebase_core: ^2.4.1
  camera: ^0.10.3
  tflite: ^1.1.2
  firebase_ml_model_downloader: ^0.2.0+7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0


